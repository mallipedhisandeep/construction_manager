publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # =========================
  # WEB / FILES
  # =========================

  file_picker: ^10.1.9
  url_launcher: ^6.3.1
